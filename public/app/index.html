<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MX AirCanvas3D - Draw in Air</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: white;
            overflow: hidden;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        #canvas3d {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #videoContainer {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 240px;
            height: 180px;
            border-radius: 12px;
            overflow: hidden;
            border: 3px solid #00B8FC;
            box-shadow: 0 8px 32px rgba(0, 184, 252, 0.3);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #canvasOverlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.95);
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #00B8FC;
            min-width: 280px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 8px;
            color: #00B8FC;
            font-weight: 600;
            font-size: 14px;
        }

        .control-group input[type="range"] {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            outline: none;
        }

        .control-group input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 18px;
            height: 18px;
            background: #00B8FC;
            border-radius: 50%;
            cursor: pointer;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .color-option {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }

        .color-option.active {
            border-color: white;
            transform: scale(1.1);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #00B8FC;
            color: white;
        }

        .btn-primary:hover {
            background: #0099d6;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #333;
            color: white;
        }

        .btn-secondary:hover {
            background: #444;
        }

        .btn-danger {
            background: #EF4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .status {
            position: absolute;
            top: 20px;
            right: 280px;
            background: rgba(26, 26, 26, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #00B8FC;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .status-item:last-child {
            margin-bottom: 0;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #EF4444;
        }

        .status-dot.active {
            background: #10B981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .gesture-hint {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(26, 26, 26, 0.95);
            padding: 15px 20px;
            border-radius: 12px;
            border: 2px solid #8B5CF6;
            max-width: 300px;
        }

        .gesture-hint h3 {
            color: #8B5CF6;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .gesture-hint ul {
            list-style: none;
            font-size: 13px;
            line-height: 1.8;
        }

        .gesture-hint li {
            color: #ccc;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #333;
            border-top-color: #00B8FC;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .mode-indicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 184, 252, 0.9);
            padding: 20px 40px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .mode-indicator.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas3d"></canvas>
        
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Initializing hand tracking...</p>
        </div>

        <div class="controls" style="display: none;" id="controls">
            <h3 style="margin-bottom: 15px; color: #00B8FC;">
                <i class="fas fa-sliders-h"></i> Controls
            </h3>
            
            <div class="control-group">
                <label>
                    <i class="fas fa-paint-brush"></i> Brush Size: <span id="sizeValue">5</span>px
                </label>
                <input type="range" id="brushSize" min="1" max="20" value="5">
            </div>

            <div class="control-group">
                <label><i class="fas fa-palette"></i> Color</label>
                <div class="color-picker">
                    <div class="color-option active" style="background: #00B8FC;" data-color="#00B8FC"></div>
                    <div class="color-option" style="background: #8B5CF6;" data-color="#8B5CF6"></div>
                    <div class="color-option" style="background: #10B981;" data-color="#10B981"></div>
                    <div class="color-option" style="background: #F59E0B;" data-color="#F59E0B"></div>
                    <div class="color-option" style="background: #EF4444;" data-color="#EF4444"></div>
                    <div class="color-option" style="background: #FFFFFF;" data-color="#FFFFFF"></div>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-secondary" id="undoBtn">
                    <i class="fas fa-undo"></i> Undo
                </button>
                <button class="btn btn-danger" id="clearBtn">
                    <i class="fas fa-trash"></i> Clear
                </button>
            </div>
        </div>

        <div class="status" style="display: none;" id="status">
            <div class="status-item">
                <div class="status-dot" id="cameraStatus"></div>
                <span>Camera</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="handStatus"></div>
                <span>Hand Detected</span>
            </div>
            <div class="status-item">
                <div class="status-dot" id="drawingStatus"></div>
                <span>Drawing Mode</span>
            </div>
        </div>

        <div id="videoContainer" style="display: none;">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvasOverlay"></canvas>
        </div>

        <div class="gesture-hint" style="display: none;" id="gestureHint">
            <h3><i class="fas fa-hand-paper"></i> Gestures</h3>
            <ul>
                <li>👆 <strong>Index finger up:</strong> Draw</li>
                <li>✊ <strong>Fist:</strong> Stop drawing</li>
                <li>🤏 <strong>Pinch:</strong> Adjust size</li>
                <li>👈 <strong>Swipe left:</strong> Undo</li>
            </ul>
        </div>

        <div class="mode-indicator" id="modeIndicator"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
